<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glitter | Cart</title>
  <link rel="stylesheet" href="assets/glitter-site.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body data-page="cart">
  <div class="top-strip" id="topStrip"></div>
  <header class="site-header" id="siteHeader"></header>
  <div class="side-backdrop" id="sideBackdrop" hidden></div>
  <aside class="side-menu" id="sideMenu" hidden></aside>
  <aside class="drawer" id="productDrawer" hidden></aside>
  <main id="cartRoot"></main>
  <footer class="footer" id="siteFooter"></footer>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/glitter-data.js"></script>
  <script src="assets/glitter-store.js"></script>
</body>
</html>
