<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glitter Admin | Login</title>
  <link rel="stylesheet" href="assets/glitter-site.css">
</head>
<body data-admin-page="login">
  <section class="login-screen">
    <form class="login-card" id="loginForm">
      <img src="assets/glitter-logo.jpeg" alt="Glitter logo">
      <h1>Glitter Admin</h1>
      <div class="field"><label>اسم المستخدم</label><input name="username" required autocomplete="username" placeholder="admin"></div>
      <div class="field"><label>كلمة السر</label><input name="password" required type="password" autocomplete="current-password" placeholder="Glitter@2026"></div>
      <button class="gold-btn" type="submit">دخول</button>
    </form>
  </section>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/glitter-data.js"></script>
  <script src="assets/glitter-admin.js"></script>
</body>
</html>
