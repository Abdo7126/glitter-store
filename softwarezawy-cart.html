<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>السلة والدفع | SoftwareZawy</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="assets/softwarezawy-site.css">
  <script src="assets/softwarezawy-data.js" defer></script>
  <script src="assets/softwarezawy-store.js" defer></script>
  <script src="assets/softwarezawy-cart.js" defer></script>
</head>
<body>
  <header class="site-header" data-header></header>
  <div class="drawer" data-drawer></div>
  <main class="page-shell">
    <p class="eyebrow">Checkout</p>
    <h1>السلة والدفع</h1>
    <div class="cart-layout">
      <section class="stack" data-cart-items></section>
      <aside class="stack">
        <div class="cart-box" data-cart-summary></div>
        <form class="form-panel" data-order-form>
          <h2>بيانات الطلب</h2>
          <label>الاسم<input name="name" required></label>
          <label>الهاتف<input name="phone" required inputmode="tel"></label>
          <label>البريد الإلكتروني<input name="email" type="email"></label>
          <label>ملاحظات<textarea name="notes" placeholder="اذكر البريد المراد التفعيل عليه أو أي تفاصيل مهمة"></textarea></label>
          <button class="btn primary" type="submit">إرسال الطلب على واتساب</button>
        </form>
      </aside>
    </div>
  </main>
</body>
</html>
